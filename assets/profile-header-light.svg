<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="260" viewBox="0 0 1280 260" role="img" aria-labelledby="title desc">
  <title id="title">Artem Ermilov - Python Backend Engineer</title>
  <desc id="desc">A clean architectural diagram connects API, events, workers, and data beside Artem Ermilov's name.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#1f2328" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8c959f"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="1278" height="258" rx="24" fill="#f6f8fa" stroke="#d0d7de"/>
  <path d="M0 201 C230 153 370 254 592 210 C778 173 958 118 1280 164 L1280 260 L0 260 Z" fill="#0969da" opacity="0.045"/>

  <g font-family="ui-monospace, SFMono-Regular, Consolas, Liberation Mono, monospace">
