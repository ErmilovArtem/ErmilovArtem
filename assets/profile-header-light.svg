    <circle cx="972" cy="178" r="6" fill="#8250df"/>
    <text x="988" y="183" fill="#1f2328">WORKER</text>

    <rect x="714" y="151" width="128" height="54" rx="13" fill="#ffffff" stroke="#d0d7de"/>
    <circle cx="738" cy="178" r="6" fill="#1f883d"/>
    <text x="754" y="183" fill="#1f2328">DATA</text>

