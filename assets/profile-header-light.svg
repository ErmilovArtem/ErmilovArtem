      <path d="M4 7.2 6.2 9.4 10.5 4.8" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="25" y="12" font-size="14" fill="#57606a">OPEN TO PYTHON BACKEND ROLES</text>
    </g>
  </g>

  <g filter="url(#shadow)" font-family="ui-monospace, SFMono-Regular, Consolas, Liberation Mono, monospace" font-size="14" font-weight="700">
    <path d="M842 81 H948" stroke="#8c959f" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M1008 108 V151" stroke="#8c959f" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M948 179 H842" stroke="#8c959f" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M782 151 V108" stroke="#8c959f" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M842 179 H1090" stroke="#8c959f" stroke-width="2" stroke-dasharray="5 7"/>

    <rect x="714" y="54" width="128" height="54" rx="13" fill="#ffffff" stroke="#d0d7de"/>
    <circle cx="738" cy="81" r="6" fill="#0969da"/>
    <text x="754" y="86" fill="#1f2328">API</text>

    <rect x="948" y="54" width="120" height="54" rx="13" fill="#ffffff" stroke="#d0d7de"/>
