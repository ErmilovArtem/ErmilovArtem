    <text x="70" y="129" font-size="35" font-weight="700" fill="#1f2328">PYTHON BACKEND ENGINEER</text>
    <text x="70" y="169" font-size="17" fill="#57606a">reliable services / data-heavy workflows / measurable performance</text>
    <g transform="translate(70 197)">
